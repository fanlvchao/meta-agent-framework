<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta-Agent Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
    .header { background: #1e293b; padding: 20px 32px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header .status { display: flex; gap: 16px; font-size: 13px; color: #94a3b8; }
    .header .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot.green { background: #22c55e; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .dot.gray { background: #64748b; }

    .container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px 32px; max-width: 1400px; margin: auto; }
    .panel { background: #1e293b; border-radius: 8px; border: 1px solid #334155; overflow: hidden; }
    .panel-header { padding: 12px 16px; border-bottom: 1px solid #334155; font-size: 14px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
    .panel-body { padding: 0; max-height: 400px; overflow-y: auto; }
    .panel.full-width { grid-column: 1 / -1; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 16px; color: #94a3b8; font-weight: 500; background: #0f172a; position: sticky; top: 0; }
    td { padding: 8px 16px; border-top: 1px solid #1e293b; }
    tr:hover td { background: #334155; }

    .badge { padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .badge.online { background: #064e3b; color: #6ee7b7; }
    .badge.offline { background: #78350f; color: #fcd34d; }
    .badge.busy { background: #1e3a5f; color: #7dd3fc; }
    .badge.dead { background: #7f1d1d; color: #fca5a5; }
    .badge.pending { background: #334155; color: #94a3b8; }
    .badge.running { background: #1e3a5f; color: #7dd3fc; }
    .badge.completed { background: #064e3b; color: #6ee7b7; }
    .badge.failed { background: #7f1d1d; color: #fca5a5; }
    .badge.dispatched { background: #3b0764; color: #d8b4fe; }

    .stats { display: flex; gap: 16px; padding: 16px; }
    .stat-card { flex: 1; background: #0f172a; border-radius: 6px; padding: 16px; text-align: center; }
    .stat-card .number { font-size: 28px; font-weight: 700; }
    .stat-card .label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

    .event-log { font-family: 'SF Mono', Monaco, monospace; font-size: 12px; padding: 12px 16px; }
    .event-log .event { padding: 4px 0; border-bottom: 1px solid #1e293b; }
    .event-log .time { color: #64748b; margin-right: 8px; }
    .event-log .type { color: #7dd3fc; margin-right: 8px; }

    .btn { padding: 4px 12px; border-radius: 4px; border: 1px solid #475569; background: #334155; color: #e2e8f0; cursor: pointer; font-size: 12px; }
    .btn:hover { background: #475569; }
    .btn.danger { border-color: #dc2626; color: #fca5a5; }
    .btn.danger:hover { background: #7f1d1d; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Meta-Agent Dashboard</h1>
    <div class="status">
      <span><span class="dot green" id="sse-dot"></span>SSE <span id="sse-status">connecting...</span></span>
      <span id="clock"></span>
    </div>
  </div>

  <div class="container">
    <!-- Stats -->
    <div class="panel full-width">
      <div class="stats" id="stats">
        <div class="stat-card"><div class="number" id="stat-total">-</div><div class="label">Total Agents</div></div>
        <div class="stat-card"><div class="number" style="color:#22c55e" id="stat-online">-</div><div class="label">Online</div></div>
        <div class="stat-card"><div class="number" style="color:#eab308" id="stat-offline">-</div><div class="label">Offline</div></div>
        <div class="stat-card"><div class="number" style="color:#ef4444" id="stat-dead">-</div><div class="label">Dead</div></div>
        <div class="stat-card"><div class="number" style="color:#7dd3fc" id="stat-tasks">-</div><div class="label">Tasks Today</div></div>
      </div>
    </div>

    <!-- Agents -->
    <div class="panel">
      <div class="panel-header">Registered Agents <button class="btn" onclick="refreshAgents()">Refresh</button></div>
      <div class="panel-body">
        <table><thead><tr><th>Name</th><th>Status</th><th>Endpoint</th><th>Actions</th></tr></thead>
        <tbody id="agents-table"></tbody></table>
      </div>
    </div>

    <!-- Tasks -->
    <div class="panel">
      <div class="panel-header">Tasks <button class="btn" onclick="refreshTasks()">Refresh</button></div>
      <div class="panel-body">
        <table><thead><tr><th>Title</th><th>Status</th><th>Agent</th><th>Time</th></tr></thead>
        <tbody id="tasks-table"></tbody></table>
      </div>
    </div>

    <!-- Event Log -->
    <div class="panel full-width">
      <div class="panel-header">Event Log (Live)</div>
      <div class="panel-body event-log" id="event-log" style="max-height:250px;"></div>
    </div>
  </div>

  <script>
    const API = '';

    // --- SSE ---
    function connectSSE() {
      const es = new EventSource(`${API}/api/events`);
      es.addEventListener('connected', () => {
        document.getElementById('sse-dot').className = 'dot green';
        document.getElementById('sse-status').textContent = 'connected';
      });
      ['agent_registered','agent_offline','agent_dead','task_created','task_dispatched','task_completed','task_failed'].forEach(evt => {
        es.addEventListener(evt, (e) => {
          const data = JSON.parse(e.data);
          addEvent(data);
          refreshAgents();
          refreshTasks();
          refreshStats();
        });
      });
      es.onerror = () => {
        document.getElementById('sse-dot').className = 'dot red';
        document.getElementById('sse-status').textContent = 'disconnected';
      };
    }

    function addEvent(evt) {
      const log = document.getElementById('event-log');
      const div = document.createElement('div');
      div.className = 'event';
      const time = new Date(evt.timestamp).toLocaleTimeString();
      div.innerHTML = `<span class="time">${time}</span><span class="type">${evt.type}</span>${JSON.stringify(evt.data)}`;
      log.prepend(div);
      // 限制 100 条
      while (log.children.length > 100) log.removeChild(log.lastChild);
    }

    // --- Data ---
    async function refreshAgents() {
      const res = await fetch(`${API}/api/agents`);
      const agents = await res.json();
      const tbody = document.getElementById('agents-table');
      tbody.innerHTML = agents.map(a => `
        <tr>
          <td><strong>${a.name}</strong></td>
          <td><span class="badge ${a.status}">${a.status}</span></td>
          <td style="font-size:11px;color:#64748b">${a.endpoint}</td>
          <td>
            ${a.status === 'dead' ? `<button class="btn danger" onclick="restartAgent('${a.id}')">Restart</button>` : ''}
          </td>
        </tr>
      `).join('');
    }

    async function refreshTasks() {
      const res = await fetch(`${API}/api/tasks?limit=20`);
      const tasks = await res.json();
      const tbody = document.getElementById('tasks-table');
      tbody.innerHTML = tasks.map(t => `
        <tr>
          <td>${t.title}</td>
          <td><span class="badge ${t.status}">${t.status}</span></td>
          <td>${t.assigned_agent_name || '-'}</td>
          <td style="font-size:11px;color:#64748b">${new Date(t.created_at).toLocaleTimeString()}</td>
        </tr>
      `).join('');
    }

    async function refreshStats() {
      const res = await fetch(`${API}/api/agents/stats`);
      const s = await res.json();
      document.getElementById('stat-total').textContent = s.total;
      document.getElementById('stat-online').textContent = s.online;
      document.getElementById('stat-offline').textContent = s.offline;
      document.getElementById('stat-dead').textContent = s.dead;
      // tasks count
      const tres = await fetch(`${API}/api/tasks?limit=1000`);
      const tasks = await tres.json();
      document.getElementById('stat-tasks').textContent = tasks.length;
    }

    async function restartAgent(id) {
      const res = await fetch(`${API}/api/agents/${id}/restart`, { method: 'POST' });
      const data = await res.json();
      alert(data.message);
      refreshAgents();
    }

    // --- Clock ---
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    // --- Init ---
    connectSSE();
    refreshAgents();
    refreshTasks();
    refreshStats();
  </script>
</body>
</html>
